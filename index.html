<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>River</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blur: 20px; --panel-radius: 35px; --glass: rgba(10, 10, 10, 0.85); --border: rgba(255, 255, 255, 0.05); }
        body, html { margin: 0; height: 100%; width: 100%; background: #000; overflow: hidden; font-family: 'Inter', sans-serif; color: white; cursor: default; }
        
        #bg-wrapper { position: fixed; inset: 0; z-index: 0; background: #000; }
        #bg-wrapper video { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 1.5s ease; }
        
        #splash { position: fixed; inset: 0; z-index: 9999; background: #000; display: flex; align-items: center; justify-content: center; transition: all 1s ease; cursor: pointer; }
        #splash h1 { font-family: monospace; color: #444; font-size: 1rem; letter-spacing: 5px; }
        #splash.hidden { opacity: 0; visibility: hidden; filter: blur(20px); }
        
        #overlay { position: absolute; inset: 0; z-index: 10; display: flex; align-items: center; justify-content: center; perspective: 1200px; }
        #glass-group { display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; max-width: 500px; transition: transform 0.1s ease-out; }
        
        .glass-card { width: 100%; background: var(--glass); backdrop-filter: blur(var(--blur)); border: 1px solid var(--border); border-radius: var(--panel-radius); padding: 35px; box-shadow: 0 40px 100px rgba(0,0,0,0.8); }
        .top-row { display: flex; align-items: center; gap: 25px; margin-bottom: 30px; }
        .profile-pic { width: 90px; height: 90px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.1); object-fit: cover; }
        
        .username-wrapper { display: flex; align-items: center; gap: 10px; }
        .username { font-size: 2.2rem; font-weight: 900; letter-spacing: -1px; }
        .verified-badge { color: #3897f0; font-size: 1.2rem; cursor: help; }
        
        #status-widget { background: rgba(255,255,255,0.02); border-radius: 25px; padding: 18px; display: flex; align-items: center; gap: 20px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.03); }
        .vinyl-anim { width: 50px; height: 50px; border-radius: 50%; animation: spin 5s linear infinite; object-fit: cover; }
        @keyframes spin { from {transform: rotate(0deg)} to {transform: rotate(360deg)} }
        
        .social-links { display: flex; justify-content: center; }
        .social-links a { color: white; font-size: 2.5rem; opacity: 0.6; transition: 0.3s; }
        .social-links a:hover { opacity: 1; transform: scale(1.1); }
        
        #audio-panel { width: 100%; padding: 15px 30px; display: flex; align-items: center; }
        .audio-controls { display: flex; align-items: center; gap: 15px; width: 100%; }
        .audio-btn { background: none; border: none; color: white; font-size: 1.2rem; cursor: pointer; opacity: 0.8; transition: 0.2s; }
        .audio-btn:hover { opacity: 1; }
        
        #seekbar { flex-grow: 1; accent-color: #fff; cursor: pointer; height: 3px; appearance: none; background: rgba(255,255,255,0.1); }
        #time-display { font-family: monospace; font-size: 11px; color: #555; min-width: 85px; text-align: right; }
    </style>
</head>
<body>

<div id="splash"><h1>[ click anywhere ]</h1></div>
<div id="bg-wrapper"><video id="bg-video" loop muted playsinline></video></div>

<div id="overlay">
    <div id="glass-group">
        <div class="glass-card">
            <div class="top-row">
                <img class="profile-pic" src="pfp.jpg" alt="Profile">
                <div>
                    <div class="username-wrapper">
                        <span class="username">River</span>
                        <i class="fa-solid fa-circle-check verified-badge" title="Owner of site"></i>
                    </div>
                    <div style="font-size: 11px; opacity: 0.4; font-family: monospace;">cybersec</div>
                </div>
            </div>

            <div id="status-widget">
                <img id="track-art" class="vinyl-anim" src="pfp.jpg">
                <div>
                    <div style="font-size: 9px; color: #444; text-transform: uppercase; letter-spacing: 2px;">Playing Visualizer</div>
                    <div id="track-name" style="font-size: 14px; font-weight: 600; color: #eee;">Loading...</div>
                </div>
            </div>

            <div class="social-links">
                <a href="https://discord.gg/DcVxYfRYMn" target="_blank"><i class="fa-brands fa-discord"></i></a>
            </div>
        </div>

        <div class="glass-card" id="audio-panel">
            <div class="audio-controls">
                <button id="playBtn" class="audio-btn"><i class="fa-solid fa-pause"></i></button>
                <button id="skipBtn" class="audio-btn"><i class="fa-solid fa-forward-step"></i></button>
                <input id="seekbar" type="range" min="0" max="100" value="0">
                <span id="time-display">00:00 / 00:00</span>
            </div>
        </div>
    </div>
</div>

<audio id="main-audio"></audio>

<script>
    // --- Playlist Setup ---
    const playlist = [
        { name: "junkie - jaydes", src: "junkie.mp3", art: "junkie.jpg", video: "junkie.mp4" },
        { name: "break - otuka", src: "break2.mp3", art: "break.jpg", video: "breaklol.mp4" },
        { name: "tell me your regrets - jades", src: "regrets2.mp3", art: "regrets.jpg", video: "regrets2.mp4" }
    ];

    let currentIdx = 0;
    const audio = document.getElementById('main-audio');
    const video = document.getElementById('bg-video');
    const glassGroup = document.getElementById('glass-group');
    const splash = document.getElementById('splash');

    // --- Interaction & UI Logic ---
    
    // 3D Mouse Tilt Effect
    document.addEventListener('mousemove', e => {
        const x = (window.innerWidth / 2 - e.pageX) / 40;
        const y = (window.innerHeight / 2 - e.pageY) / 40;
        glassGroup.style.transform = `rotateY(${-x}deg) rotateX(${y}deg)`;
    });

    // Splash Screen Click
    splash.addEventListener('click', () => {
        splash.classList.add('hidden');
        loadTrack(0);
    });

    // --- Protection Scripts ---

    // Disable Right-Click
    document.addEventListener('contextmenu', event => event.preventDefault());

    // Block Inspect Element & View Source Shortcuts
    document.onkeydown = function(e) {
        // F12
        if(e.keyCode == 123) return false;
        // Ctrl+Shift+I (Inspect), Ctrl+Shift+J (Console), Ctrl+U (Source)
        if(e.ctrlKey && (e.shiftKey && (e.keyCode == 73 || e.keyCode == 74) || e.keyCode == 85)) {
            return false;
        }
    };

    // --- Audio/Video Engine ---

    function loadTrack(idx) {
        currentIdx = idx;
        const track = playlist[idx];
        video.style.opacity = 0;
        
        setTimeout(() => {
            audio.src = track.src;
            video.src = track.video;
            
            // Force reload to ensure video starts properly
            video.load(); 

            document.getElementById('track-name').innerText = track.name;
            document.getElementById('track-art').src = track.art;
            
            audio.play().catch(() => {});
            video.play().then(() => {
                video.style.opacity = 0.5;
            }).catch(() => {
                console.error("Video failed to play: " + track.video);
            });
            
            document.getElementById('playBtn').innerHTML = '<i class="fa-solid fa-pause"></i>';
        }, 400);
    }

    document.getElementById('playBtn').addEventListener('click', () => {
        if (audio.paused) {
            audio.play(); video.play();
            document.getElementById('playBtn').innerHTML = '<i class="fa-solid fa-pause"></i>';
        } else {
            audio.pause(); video.pause();
            document.getElementById('playBtn').innerHTML = '<i class="fa-solid fa-play"></i>';
        }
    });

    document.getElementById('skipBtn').addEventListener('click', () => {
        currentIdx = (currentIdx + 1) % playlist.length;
        loadTrack(currentIdx);
    });

    audio.ontimeupdate = () => {
        const seek = document.getElementById('seekbar');
        seek.value = (audio.currentTime / audio.duration) * 100 || 0;
        document.getElementById('time-display').innerText = `${fmt(audio.currentTime)} / ${fmt(audio.duration)}`;
        
        // Sync video to audio if they drift
        if (Math.abs(video.currentTime - audio.currentTime) > 0.3) {
            video.currentTime = audio.currentTime;
        }
    };

    document.getElementById('seekbar').oninput = function() {
        const time = (this.value / 100) * audio.duration;
        audio.currentTime = time;
        video.currentTime = time;
    };

    audio.onended = () => document.getElementById('skipBtn').click();

    function fmt(s) {
        if (!s || isNaN(s)) return "00:00";
        const m = Math.floor(s/60), sec = Math.floor(s%60);
        return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
    }
</script>
</body>
</html>
